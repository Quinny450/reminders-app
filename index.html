<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reminders App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="composer-panel" aria-labelledby="app-title">
        <div class="heading-block">
          <p class="kicker">Daily Rhythm</p>
          <h1 id="app-title">Reminders</h1>
          <p class="intro">
            Capture what matters, decide when it needs attention, and keep the
            day from getting slippery.
          </p>
        </div>

        <form id="reminder-form" class="reminder-form">
          <label class="field field-full">
            <span>Reminder</span>
            <input
              id="title-input"
              name="title"
              type="text"
              maxlength="120"
              placeholder="Submit expense report"
              required
            />
          </label>

          <label class="field">
            <span>Due date</span>
            <input id="date-input" name="dueDate" type="date" />
          </label>

          <label class="field">
            <span>Priority</span>
            <select id="priority-input" name="priority">
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </label>

          <label class="field field-full">
            <span>Notes</span>
            <textarea
              id="notes-input"
              name="notes"
              rows="4"
              maxlength="240"
              placeholder="Send it before lunch so approvals can land today."
            ></textarea>
          </label>

          <div class="form-actions">
            <button type="submit" class="primary-button">Add reminder</button>
            <p class="status-text" id="status-text" aria-live="polite">
              Nothing waiting yet.
            </p>
          </div>
        </form>
      </section>

      <section class="board-panel" aria-labelledby="board-title">
        <div class="board-header">
          <div>
            <p class="kicker">Overview</p>
            <h2 id="board-title">Reminder Board</h2>
          </div>
          <div class="summary-strip" aria-live="polite">
            <div class="summary-item">
              <span class="summary-label">Open</span>
              <strong id="open-count">0</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Due today</span>
              <strong id="today-count">0</strong>
            </div>
            <div class="summary-item">
              <span class="summary-label">Completed</span>
              <strong id="done-count">0</strong>
            </div>
          </div>
        </div>

        <div class="toolbar" aria-label="Reminder filters">
          <div class="filter-group" role="tablist" aria-label="View filter">
            <button class="filter-chip active" data-filter="all" type="button">
              All
            </button>
            <button class="filter-chip" data-filter="today" type="button">
              Today
            </button>
            <button class="filter-chip" data-filter="upcoming" type="button">
              Upcoming
            </button>
            <button class="filter-chip" data-filter="done" type="button">
              Done
            </button>
          </div>

          <label class="search-field">
            <span class="visually-hidden">Search reminders</span>
            <input
              id="search-input"
              type="search"
              placeholder="Search reminders"
            />
          </label>
        </div>

        <ul id="reminder-list" class="reminder-list" aria-live="polite"></ul>
      </section>
    </main>

    <template id="empty-state-template">
      <li class="empty-state">
        <h3>No reminders match this view.</h3>
        <p>Try a different filter or add something new above.</p>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
